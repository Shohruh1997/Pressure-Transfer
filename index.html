<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Конвертер давления</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc; /* slate-50 */
        }
        
        /* Скрытие стрелок у поля type="number" для эстетики */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="text-slate-800 sm:p-4 md:p-8 flex justify-center items-center min-h-screen">

    <!-- Главный контейнер (на мобильном на весь экран, на ПК - как экран телефона) -->
    <div class="w-full h-screen sm:h-[850px] sm:max-w-md bg-slate-100 sm:rounded-[2.5rem] sm:shadow-2xl flex flex-col relative overflow-hidden">
        
        <!-- Шапка: Область ввода (стилизована под дисплей калькулятора) -->
        <div class="bg-blue-600 px-6 pt-12 pb-8 text-white sm:rounded-t-[2.5rem] rounded-b-3xl shadow-lg z-10 flex-shrink-0">
            <h1 class="text-center font-medium text-blue-200 tracking-wide mb-8 uppercase text-xs">
                Конвертер давления
            </h1>
            
            <div class="flex flex-col items-end">
                <input 
                    type="number" 
                    id="inputValue" 
                    class="w-full bg-transparent text-right text-5xl font-bold text-white placeholder-blue-300 focus:outline-none border-b border-blue-400 focus:border-white pb-3 transition-colors mb-5" 
                    placeholder="0" 
                    value="1"
                    step="any"
                    inputmode="decimal"
                >
                
                <div class="relative w-full">
                    <select 
                        id="inputUnit" 
                        class="w-full appearance-none bg-blue-700/50 border border-blue-500/50 text-white px-5 py-4 rounded-xl font-medium focus:outline-none focus:ring-2 focus:ring-white/50 cursor-pointer text-lg"
                    >
                        <!-- Опции генерируются через app.js -->
                    </select>
                    <!-- Кастомная стрелочка -->
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-blue-200">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </div>
                </div>
            </div>
        </div>

        <!-- Тело: Список результатов -->
        <div class="flex-1 overflow-y-auto p-4 sm:px-6 pb-24 space-y-3 bg-slate-100" id="resultsGrid">
            <!-- Карточки с результатами генерируются через app.js -->
        </div>

        <!-- Уведомление о копировании (Toast) -->
        <div id="toast" class="absolute bottom-8 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full font-medium shadow-xl transform translate-y-20 opacity-0 transition-all duration-300 pointer-events-none z-50 flex items-center gap-2 whitespace-nowrap">
            <svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            Скопировано!
        </div>
    </div>

    <!-- Подключаем логику -->
    <script src="app.js"></script>
</body>
</html>
