<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конвертер давления</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        
        /* Скрытие стрелок у поля type="number" для эстетики */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-2xl w-full bg-white rounded-2xl shadow-xl p-6 sm:p-10 transition-all">
        <h1 class="text-3xl font-bold text-slate-800 mb-8 text-center tracking-tight">
            Конвертер давления
        </h1>
        
        <!-- Секция ввода -->
        <div class="flex flex-col sm:flex-row gap-5 mb-8">
            <div class="flex-1">
                <label for="inputValue" class="block text-sm font-semibold text-slate-700 mb-2">Значение</label>
                <input 
                    type="number" 
                    id="inputValue" 
                    class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition text-slate-800 text-lg" 
                    placeholder="Введите значение..." 
                    value="1"
                    step="any"
                >
            </div>
            <div class="sm:w-2/5">
                <label for="inputUnit" class="block text-sm font-semibold text-slate-700 mb-2">Исходная единица</label>
                <div class="relative">
                    <select 
                        id="inputUnit" 
                        class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-white cursor-pointer appearance-none text-slate-800 text-lg"
                    >
                        <!-- Опции генерируются через app.js -->
                    </select>
                    <!-- Кастомная стрелочка для селекта -->
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </div>
                </div>
            </div>
        </div>

        <!-- Секция результатов -->
        <div class="bg-slate-50 rounded-xl p-6 border border-slate-200">
            <h2 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-4">Результаты конвертации:</h2>
            <div id="resultsGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <!-- Карточки с результатами генерируются через app.js -->
            </div>
        </div>
    </div>

    <!-- Подключаем логику -->
    <script src="app.js"></script>
</body>
</html>
