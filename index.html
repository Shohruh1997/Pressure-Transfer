    <style>
        :root {
            color-scheme: light;
            --bg: #f3efe6;
            --bg-accent: rgba(185, 118, 53, 0.14);
            --surface: rgba(255, 252, 245, 0.84);
            --surface-strong: rgba(255, 255, 255, 0.96);
            --surface-muted: rgba(126, 94, 61, 0.08);
            --border: rgba(126, 94, 61, 0.15);
            --text: #1f2933;
            --text-soft: #52606d;
            --accent: #b85d18;
            --accent-strong: #8f4510;
            --accent-soft: rgba(184, 93, 24, 0.12);
            --shadow: 0 24px 70px rgba(74, 52, 35, 0.14);
        }

        [data-theme="dark"] {
            color-scheme: dark;
            --bg: #141a1f;
            --bg-accent: rgba(255, 176, 89, 0.16);
            --surface: rgba(17, 25, 31, 0.84);
            --surface-strong: rgba(24, 35, 43, 0.96);
            --surface-muted: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.09);
            --text: #f5efe6;
            --text-soft: #b9c3ce;
            --accent: #ffb05a;
            --accent-strong: #ffd39d;
            --accent-soft: rgba(255, 176, 90, 0.16);
            --shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Manrope', sans-serif;
            background:
                radial-gradient(circle at top left, var(--bg-accent), transparent 32%),
                radial-gradient(circle at bottom right, rgba(41, 134, 204, 0.12), transparent 24%),
                var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        body.modal-open {
            overflow: hidden;
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .app-shell {
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
        }

        .app-shell[data-active-category="currency"] {
            --accent: #3b82f6;
            --accent-strong: #2563eb;
            --accent-soft: rgba(59, 130, 246, 0.14);
        }

        .category-layout {
            align-items: start;
            display: grid;
            gap: 1rem;
        }

        .category-layout.is-currency-collapsed {
            display: block;
        }

        .category-layout.is-currency-collapsed .input-panel {
            margin: 0 auto;
            max-width: 46rem;
            width: 100%;
        }

        .category-layout.is-currency-collapsed .results-panel {
            display: none;
        }

        @media (min-width: 1024px) {
            .category-layout {
                grid-template-columns: minmax(320px, 0.92fr) minmax(420px, 1.08fr);
            }
        }

        .surface-card {
            background: var(--surface-strong);
            border: 1px solid var(--border);
            box-shadow: 0 14px 32px rgba(15, 23, 42, 0.06);
        }

        .category-toolbar {
            display: grid;
            gap: 0.85rem;
        }

        .category-nav-shell {
            min-width: 0;
        }

        .category-select-label {
            display: block;
        }

        .category-select-caption {
            color: var(--text-soft);
            display: block;
            font-size: 0.76rem;
            font-weight: 800;
            letter-spacing: 0.2em;
            margin-bottom: 0.65rem;
            text-transform: uppercase;
        }

        .category-select-wrap {
            position: relative;
        }

        .category-select {
            appearance: none;
            background: linear-gradient(180deg, var(--surface-strong), var(--surface-muted));
            border-radius: 1.2rem;
            font-size: 0.98rem;
            font-weight: 800;
            letter-spacing: 0.03em;
            min-height: 3.5rem;
            padding: 0.95rem 3.4rem 0.95rem 1rem;
        }

        .category-select-icon {
            align-items: center;
            color: var(--text-soft);
            display: inline-flex;
            inset: 0 1rem 0 auto;
            pointer-events: none;
            position: absolute;
        }

        .category-select:focus {
            box-shadow: 0 0 0 4px rgba(184, 93, 24, 0.12);
        }

        .category-toolbar .currency-calculator-toggle {
            justify-self: start;
            white-space: nowrap;
        }

        .field-control,
        .select-control {
            width: 100%;
            border: 1px solid var(--border);
            background: var(--surface-strong);
            color: var(--text);
            transition: border-color 150ms ease, box-shadow 150ms ease, transform 150ms ease;
        }

        .field-control:focus,
        .select-control:focus {
            outline: none;
            border-color: rgba(184, 93, 24, 0.45);
            box-shadow: 0 0 0 4px rgba(184, 93, 24, 0.12);
        }

        .field-control:disabled,
        .select-control:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .result-card {
            background: linear-gradient(180deg, var(--surface-strong), rgba(255, 255, 255, 0.74));
            border: 1px solid var(--border);
        }

        [data-theme="dark"] .result-card {
            background: linear-gradient(180deg, rgba(24, 35, 43, 0.96), rgba(17, 25, 31, 0.9));
        }

        .copy-button,
        .theme-button {
            transition: 160ms ease;
        }

        .copy-button:hover,
        .theme-button:hover,
        .copy-button:focus-visible,
        .theme-button:focus-visible {
            transform: translateY(-1px);
        }

        .toast-visible {
            transform: translate(-50%, 0);
            opacity: 1;
        }

        .is-hidden {
            display: none !important;
        }

        #categoryCustomContent:empty {
            display: none;
        }

        #categoryCustomContent {
            min-width: 0;
        }

        .input-panel {
            min-width: 0;
        }

        .currency-preview {
            border: 1px solid var(--border);
            border-radius: 1.35rem;
            background: var(--surface-strong);
            min-width: 0;
            max-width: 100%;
            padding: 0.9rem;
        }

        .currency-preview-header {
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
            align-items: center;
            margin-bottom: 0.85rem;
        }

        .currency-preview-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .currency-chip,
        .currency-help {
            align-items: center;
            background: var(--surface-strong);
            border: 1px solid var(--border);
            border-radius: 999px;
            color: var(--text-soft);
            display: inline-flex;
            font-size: 0.8rem;
            font-weight: 700;
            gap: 0.35rem;
            justify-content: center;
            min-height: 2.25rem;
            padding: 0 0.85rem;
        }

        .currency-chip.is-muted {
            background: var(--surface-muted);
        }

        .currency-help {
            aspect-ratio: 1;
            min-width: 2.25rem;
            padding: 0;
        }

        button.currency-help {
            cursor: pointer;
            transition: border-color 160ms ease, transform 160ms ease, background-color 160ms ease;
        }

        button.currency-help:hover,
        button.currency-help:focus-visible {
            background: var(--surface-muted);
            border-color: rgba(59, 130, 246, 0.35);
            outline: none;
            transform: translateY(-1px);
        }

        .currency-toggle-btn {
            cursor: pointer;
            transition: border-color 160ms ease, transform 160ms ease, background-color 160ms ease, color 160ms ease;
        }

        .currency-toggle-btn:hover,
        .currency-toggle-btn:focus-visible {
            background: var(--surface-muted);
            border-color: rgba(59, 130, 246, 0.35);
            color: var(--text);
            outline: none;
            transform: translateY(-1px);
        }

        .currency-preview-list {
            display: grid;
            gap: 0.75rem;
            min-width: 0;
        }

        .currency-preview-row {
            align-items: center;
            background: var(--surface-strong);
            border: 1px solid var(--border);
            border-radius: 0.85rem;
            display: grid;
            gap: 0.55rem;
            grid-template-columns: auto minmax(0, 1fr) auto;
            max-width: 100%;
            min-width: 0;
            padding: 0.55rem 0.65rem;
            transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
            width: 100%;
        }

        .currency-preview-row:hover {
            border-color: rgba(59, 130, 246, 0.3);
            box-shadow: 0 12px 24px rgba(59, 130, 246, 0.1);
            transform: translateY(-1px);
        }

        .currency-preview-row:focus-within {
            border-color: rgba(59, 130, 246, 0.38);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
        }

        .currency-row-label {
            align-items: center;
            display: flex;
            gap: 0.45rem;
            max-width: 7.5rem;
            min-width: 0;
        }

        .currency-flag {
            align-items: center;
            background: var(--accent-soft);
            border-radius: 0.65rem;
            color: var(--accent);
            display: inline-flex;
            flex-shrink: 0;
            font-size: 0.72rem;
            font-weight: 800;
            height: 2rem;
            justify-content: center;
            letter-spacing: 0.06em;
            line-height: 1;
            min-width: 2rem;
        }

        .currency-row-code {
            color: var(--text);
            font-size: 0.92rem;
            font-weight: 800;
            line-height: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .factor-preview-row .currency-flag,
        .pressure-preview-row .currency-flag,
        .temperature-preview-row .currency-flag {
            font-size: 0.74rem;
            letter-spacing: 0.05em;
            min-width: 3rem;
            padding: 0 0.55rem;
        }

        @media (max-width: 479px) {
            #appShell section.surface-card {
                margin: 0.65rem;
                padding: 0.95rem;
            }

            .input-panel,
            .results-panel {
                padding: 0.85rem;
            }

            .currency-preview {
                padding: 0.75rem;
            }

            .currency-preview-row {
                gap: 0.45rem;
                grid-template-columns: auto minmax(3.25rem, 1fr) auto;
                padding: 0.55rem 0.6rem;
            }

            .factor-preview-row .currency-row-code,
            .pressure-preview-row .currency-row-code,
            .temperature-preview-row .currency-row-code {
                display: none;
            }

            .factor-preview-row .currency-row-label,
            .pressure-preview-row .currency-row-label,
            .temperature-preview-row .currency-row-label {
                max-width: none;
            }

            .currency-row-action,
            .currency-row-clear {
                height: 1.85rem;
                width: 1.85rem;
            }

            .currency-row-clear.is-visible {
                width: 1.85rem;
            }
        }

        .currency-row-name {
            border: 0;
            clip: rect(0 0 0 0);
            height: 1px;
            margin: -1px;
            overflow: hidden;
            padding: 0;
            position: absolute;
            white-space: nowrap;
            width: 1px;
        }

        .currency-row-input {
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 1.05rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            min-width: 0;
            outline: none;
            overflow: hidden;
            padding: 0;
            text-align: right;
            text-overflow: ellipsis;
            width: 100%;
        }

        .currency-row-actions {
            align-items: center;
            display: flex;
            gap: 0.3rem;
            justify-self: end;
        }

        .currency-row-input::placeholder {
            color: var(--text-soft);
            opacity: 0.7;
        }

        .currency-row-action,
        .currency-row-clear {
            align-items: center;
            background: var(--surface-muted);
            border: 1px solid transparent;
            border-radius: 0.65rem;
            color: var(--text-soft);
            display: inline-flex;
            flex-shrink: 0;
            font-size: 0.85rem;
            height: 2rem;
            justify-content: center;
            transition: border-color 160ms ease, color 160ms ease, transform 160ms ease, background-color 160ms ease, opacity 160ms ease, width 160ms ease, margin 160ms ease;
            width: 2rem;
        }

        .currency-row-clear {
            background: var(--accent-soft);
            border-color: rgba(59, 130, 246, 0.18);
            color: var(--accent);
            font-size: 0.95rem;
            font-weight: 800;
            margin: 0;
            opacity: 0;
            overflow: hidden;
            pointer-events: none;
            width: 0;
        }

        .currency-row-clear.is-visible {
            opacity: 1;
            pointer-events: auto;
            width: 2rem;
        }

        button.currency-row-action,
        button.currency-row-clear {
            cursor: pointer;
        }

        button.currency-row-action:hover,
        button.currency-row-action:focus-visible,
        button.currency-row-clear:hover,
        button.currency-row-clear:focus-visible {
            background: var(--accent-soft);
            border-color: rgba(59, 130, 246, 0.35);
            color: var(--accent);
            outline: none;
            transform: translateY(-1px);
        }

        .currency-settings-btn {
            align-items: center;
            background: transparent;
            border: 1px dashed var(--border);
            border-radius: 1rem;
            color: var(--text-soft);
            cursor: pointer;
            display: flex;
            font-size: 0.98rem;
            font-weight: 700;
            gap: 0.55rem;
            justify-content: center;
            margin-top: 0.95rem;
            padding: 0.95rem 1rem;
            transition: border-color 160ms ease, background-color 160ms ease, color 160ms ease, transform 160ms ease;
            width: 100%;
        }

        .currency-settings-btn:hover,
        .currency-settings-btn:focus-visible {
            background: var(--surface-muted);
            border-color: rgba(59, 130, 246, 0.35);
            color: var(--text);
            outline: none;
            transform: translateY(-1px);
        }

        .currency-calculator {
            display: grid;
            gap: 1rem;
            margin: 0 auto;
            max-width: 34rem;
            width: 100%;
        }

        .currency-calculator-toolbar {
            align-items: center;
            display: flex;
            gap: 0.75rem;
            justify-content: space-between;
        }

        .currency-calculator-toggle {
            align-items: center;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 999px;
            color: var(--text-soft);
            cursor: pointer;
            display: inline-flex;
            font-size: 0.88rem;
            font-weight: 800;
            justify-content: center;
            min-height: 2.25rem;
            padding: 0 0.9rem;
            width: fit-content;
            transition: border-color 160ms ease, background-color 160ms ease, color 160ms ease, transform 160ms ease;
        }

        .currency-calculator-toggle:hover,
        .currency-calculator-toggle:focus-visible {
            background: var(--surface-muted);
            border-color: rgba(59, 130, 246, 0.35);
            color: var(--text);
            outline: none;
            transform: translateY(-1px);
        }

        .currency-calculator-display {
            background: var(--surface-strong);
            border: 1px solid var(--border);
            border-radius: 1.1rem;
            padding: 0.85rem 1rem;
        }

        .currency-calculator-label {
            color: var(--text-soft);
            font-size: 0.82rem;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .currency-calculator-expression {
            color: var(--text-soft);
            font-size: 0.96rem;
            font-weight: 700;
            letter-spacing: 0.01em;
            margin-bottom: 0.35rem;
            min-height: 1.2rem;
            text-align: right;
        }

        .currency-calculator-input {
            background: transparent;
            border: none;
            color: var(--text);
            font-size: clamp(1.9rem, 3vw, 3rem);
            font-weight: 800;
            letter-spacing: -0.05em;
            line-height: 1.05;
            min-height: 3.25rem;
            outline: none;
            padding: 0;
            text-align: right;
            width: 100%;
        }

        .currency-calculator-input::placeholder {
            color: var(--text-soft);
            opacity: 0.7;
        }

        .currency-calculator-keypad {
            display: grid;
            gap: 0.55rem;
            grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .currency-calculator-button {
            align-items: center;
            background: var(--surface-strong);
            border: 1px solid var(--border);
            border-radius: 0.9rem;
            color: var(--text);
            cursor: pointer;
            display: inline-flex;
            font-size: 1.16rem;
            font-weight: 800;
            justify-content: center;
            min-height: 3.35rem;
            transition: border-color 160ms ease, background-color 160ms ease, transform 160ms ease, color 160ms ease;
        }

        .currency-calculator-button.is-operator,
        .currency-calculator-button.is-equals {
            font-size: 1.28rem;
        }

        .currency-calculator-button:hover,
        .currency-calculator-button:focus-visible {
            background: var(--surface-muted);
            border-color: rgba(59, 130, 246, 0.35);
            color: var(--accent);
            outline: none;
            transform: translateY(-1px);
        }

        .currency-calculator-button.is-operator {
            background: var(--surface-muted);
            color: var(--accent);
        }

        .currency-calculator-button.is-danger {
            color: #f97316;
        }

        .currency-calculator-button.is-equals {
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            border-color: transparent;
            color: #fff;
        }

        .currency-calculator-button.is-equals:hover,
        .currency-calculator-button.is-equals:focus-visible {
            color: #fff;
        }

        .currency-summary {
            display: grid;
            gap: 0.9rem;
        }

        .currency-summary-hero {
            background: var(--surface-strong);
            border: 1px solid var(--border);
            border-radius: 1.1rem;
            padding: 1rem;
        }

        .currency-summary-grid {
            display: grid;
            gap: 0.75rem;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        }

        .currency-summary-card {

            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 0.95rem;
        }

        .currency-summary-label {

            font-size: 0.72rem;
            font-weight: 800;
            letter-spacing: 0.18em;
            text-transform: uppercase;

            align-items: flex-start;
            background: rgba(8, 15, 24, 0.64);
            display: flex;
            inset: 0;
            justify-content: center;
            opacity: 1;
            overflow-y: auto;
            overscroll-behavior: contain;
            padding: 1.25rem;
            position: fixed;
            transition: opacity 160ms ease, visibility 160ms ease;
            visibility: visible;
            z-index: 1000;
        }

        .settings-modal.hidden {
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
        }

        .settings-modal-card {
            background: var(--surface-strong);
            border: 1px solid var(--border);
            border-radius: 1.25rem;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            margin: auto 0;
            max-height: calc(100vh - 2.5rem);
            max-width: 28rem;
            overflow: hidden;
            padding: 1.2rem;
            width: 100%;
        }

        .settings-modal-header {
            align-items: center;
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .settings-modal-title {
            color: var(--text);
            font-size: 1.2rem;
            font-weight: 800;
        }

        .settings-modal-close {
            align-items: center;
            background: var(--surface-muted);
            border: 1px solid var(--border);
            border-radius: 999px;
            color: var(--text-soft);
            cursor: pointer;
            display: inline-flex;
            font-size: 1.15rem;
            height: 2.25rem;
            justify-content: center;
            transition: border-color 160ms ease, color 160ms ease, transform 160ms ease;
            width: 2.25rem;
        }

        .settings-modal-close:hover,
        .settings-modal-close:focus-visible {
            border-color: rgba(59, 130, 246, 0.35);
            color: var(--text);
            outline: none;
            transform: translateY(-1px);
        }

        .settings-modal-body {
            display: grid;
            flex: 1 1 auto;
            gap: 0.7rem;
            min-height: 0;
            overflow-y: auto;
            overscroll-behavior: contain;
            padding-right: 0.2rem;
            scrollbar-gutter: stable;
        }

        .settings-option {
            align-items: center;
            background: var(--surface-muted);
            border: 1px solid var(--border);
            border-radius: 1rem;
            display: flex;
            gap: 0.8rem;
            justify-content: space-between;
            padding: 0.9rem 1rem;
            position: relative;
            transition: border-color 160ms ease, box-shadow 160ms ease, opacity 160ms ease;
        }

        .settings-option.is-draggable {
            cursor: grab;
        }

        .settings-option.is-dragging {
            opacity: 0.48;
        }

        .settings-option.is-drop-before {
            border-color: rgba(59, 130, 246, 0.35);
            box-shadow: inset 0 3px 0 var(--accent);
        }

        .settings-option.is-drop-after {
            border-color: rgba(59, 130, 246, 0.35);
            box-shadow: inset 0 -3px 0 var(--accent);
        }

        .settings-option-main {
            align-items: center;
            cursor: pointer;
            display: grid;
            flex: 1;
            gap: 0.8rem;
            grid-template-columns: auto auto minmax(0, 1fr);
            min-width: 0;
        }

        .settings-option input {
            accent-color: var(--accent);
            height: 1rem;
            width: 1rem;
        }

        .settings-option-code {
            color: var(--text);
            font-size: 0.95rem;
            font-weight: 800;
        }

        .settings-option-name {
            color: var(--text-soft);
            font-size: 0.88rem;
            font-weight: 600;
        }

        .settings-drag-handle {
            align-items: center;
            background: var(--surface-strong);
            border: 1px solid var(--border);
            border-radius: 0.8rem;
            color: var(--text-soft);
            cursor: grab;
            display: inline-flex;
            flex-shrink: 0;
            height: 2.35rem;
            justify-content: center;
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            transition: border-color 160ms ease, color 160ms ease, transform 160ms ease, background-color 160ms ease;
            width: 3.3rem;
        }

        .settings-drag-handle:hover,
        .settings-drag-handle:focus-visible {
            background: var(--accent-soft);
            border-color: rgba(59, 130, 246, 0.35);
            color: var(--accent);
            outline: none;
            transform: translateY(-1px);
        }

        .settings-drag-handle.is-disabled {
            cursor: not-allowed;
            opacity: 0.45;
            transform: none;
        }

        /* ===== LARGE DESKTOP (1920px+) ===== */
        @media (min-width: 1920px) {
            .category-select {
                font-size: 1.1rem;
                min-height: 3.8rem;
            }

            .currency-calculator-input {

        /* ===== LARGE MOBILE (480px to 768px) ===== */
        @media (min-width: 480px) and (max-width: 767px) {

                margin-bottom: 0.55rem;
            }

                font-size: 1.6rem;
            }

            .surface-card {
                margin: 2rem;
                padding: 1rem;
                border-radius: 1.5rem;
            }

            .input-panel,
            .results-panel {

            }

                padding: 0.85rem 0.9rem;
            }

            .currency-calculator-keypad {
                gap: 0.48rem;
            }

            .currency-calculator-button {
                border-radius: 0.85rem;
                font-size: 1.08rem;
                min-height: 3.15rem;
            }

            .currency-calculator-input {
                font-size: clamp(1.85rem, 6vw, 2.6rem);
                min-height: 2.95rem;
            }
        }

        /* ===== MEDIUM MOBILE (375px to 480px) ===== */
        @media (min-width: 375px) and (max-width: 479px) {
            .category-layout {
                grid-template-columns: 1fr;
            }

            .category-select {
                font-size: 0.92rem;
                min-height: 3.2rem;
                padding-right: 3rem;
            }

            .category-select-caption {
                font-size: 0.7rem;
                margin-bottom: 0.5rem;
            }

                font-size: 1.5rem;
            }

            .surface-card {
                margin: 1.5rem;
                padding: 0.9rem;
                border-radius: 1.4rem;
            }

            .input-panel,
            .results-panel {
                padding: 0.95rem;
                border-radius: 1.3rem;
            }

            .currency-preview-row {
                padding: 0.8rem 0.85rem;
                gap: 0.75rem;
            }

            .currency-preview-header {
                flex-direction: column;
            }

            .currency-preview-controls {
                justify-content: flex-start;
            }

            .currency-calculator-keypad {
                gap: 0.48rem;
            }

            .currency-calculator-button {
                border-radius: 0.82rem;
                font-size: 1.05rem;
                min-height: 3.1rem;
            }

            .currency-calculator-input {

            .currency-calculator-expression {

            }

            .currency-summary-grid {

                padding: 0.8rem 0.9rem;
            }

        /* ===== SMALL MOBILE (320px to 375px) ===== */

</head>
<body>
    <!-- Навигация -->
